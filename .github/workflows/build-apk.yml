name: Build APK (Self-Healing)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Fix and Build
      run: |
        echo "🔧 STARTING SELF-HEALING BUILD..."
        
        # Проверяем и создаём корневые файлы
        echo "📁 Checking root files..."
        
        # build.gradle
        if [ ! -f "build.gradle" ]; then
          echo "⚠️  build.gradle not found! Creating..."
          cat > build.gradle << 'EOF'
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.2.2'
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0"
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
                maven { url 'https://jitpack.io' }
            }
        }
        tasks.register('clean', Delete) { delete rootProject.buildDir }
        EOF
        fi
        
        # settings.gradle
        if [ ! -f "settings.gradle" ]; then
          echo "⚠️  settings.gradle not found! Creating..."
          cat > settings.gradle << 'EOF'
        pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
                maven { url 'https://jitpack.io' }
            }
        }
        rootProject.name = "MyGallery"
        include ':app'
        EOF
        fi
        
        # gradle.properties
        if [ ! -f "gradle.properties" ]; then
          echo "⚠️  gradle.properties not found! Creating..."
          cat > gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        android.useAndroidX=true
        android.enableJetifier=true
        kotlin.code.style=official
        EOF
        fi
        
        # Проверяем app/build.gradle
        echo "📁 Checking app files..."
        if [ ! -f "app/build.gradle" ]; then
          echo "⚠️  app/build.gradle not found! Creating..."
          mkdir -p app
          cat > app/build.gradle << 'EOF'
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }
        android {
            namespace 'com.example.mygallery'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.mygallery"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                    proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions { jvmTarget = '17' }
            buildFeatures { viewBinding true }
        }
        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
            implementation 'androidx.recyclerview:recyclerview:1.3.2'
            implementation 'com.github.bumptech.glide:glide:4.16.0'
            implementation 'com.github.chrisbanes:PhotoView:2.3.0'
            implementation 'com.github.burhanrashid52:PhotoEditor:2.0.0'
        }
        EOF
        fi
        
        # Проверяем AndroidManifest.xml
        if [ ! -f "app/src/main/AndroidManifest.xml" ]; then
          echo "⚠️  AndroidManifest.xml not found! Creating..."
          mkdir -p app/src/main
          cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
            <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
            <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />
            <application android:allowBackup="true" android:icon="@mipmap/ic_launcher" android:label="Моя Галерея" android:supportsRtl="true" android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                <activity android:name=".FullscreenActivity" />
                <activity android:name=".EditorActivity" />
            </application>
        </manifest>
        EOF
        fi
        
        # Проверяем наличие Java файлов
        echo "📁 Checking Java/Kotlin files..."
        
        # MainActivity.kt
        if [ ! -f "app/src/main/java/com/example/mygallery/MainActivity.kt" ]; then
          echo "⚠️  MainActivity.kt not found! Creating..."
          mkdir -p app/src/main/java/com/example/mygallery
          cat > app/src/main/java/com/example/mygallery/MainActivity.kt << 'EOF'
        package com.example.mygallery
        
        import android.Manifest
        import android.content.pm.PackageManager
        import android.os.Build
        import android.os.Bundle
        import android.provider.MediaStore
        import android.widget.Toast
        import androidx.activity.result.contract.ActivityResultContracts
        import androidx.appcompat.app.AppCompatActivity
        import androidx.core.content.ContextCompat
        import androidx.recyclerview.widget.LinearLayoutManager
        import androidx.recyclerview.widget.RecyclerView
        import java.io.File
        import java.text.SimpleDateFormat
        import java.util.*
        
        class MainActivity : AppCompatActivity() {
            private lateinit var recyclerView: RecyclerView
            private lateinit var adapter: MediaAdapter
            private val mediaItems = mutableListOf<MediaItem>()
            private val groupedItems = mutableListOf<Pair<String, List<MediaItem>>>()
        
            private val requestPermissionLauncher = registerForActivityResult(
                ActivityResultContracts.RequestMultiplePermissions()
            ) { permissions ->
                if (permissions.values.all { it }) loadMedia()
                else Toast.makeText(this, "Нужны разрешения", Toast.LENGTH_SHORT).show()
            }
        
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_main)
                setupRecyclerView()
                checkPermissions()
            }
        
            private fun setupRecyclerView() {
                recyclerView = findViewById(R.id.recyclerView)
                recyclerView.layoutManager = LinearLayoutManager(this)
                adapter = MediaAdapter(groupedItems) { FullscreenActivity.start(this, it) }
                recyclerView.adapter = adapter
            }
        
            private fun checkPermissions() {
                val permissions = mutableListOf<String>()
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                    if (ContextCompat.checkSelfPermission(this, Manifest.permission.READ_MEDIA_IMAGES) != PackageManager.PERMISSION_GRANTED)
                        permissions.add(Manifest.permission.READ_MEDIA_IMAGES)
                    if (ContextCompat.checkSelfPermission(this, Manifest.permission.READ_MEDIA_VIDEO) != PackageManager.PERMISSION_GRANTED)
                        permissions.add(Manifest.permission.READ_MEDIA_VIDEO)
                } else {
                    if (ContextCompat.checkSelfPermission(this, Manifest.permission.READ_EXTERNAL_STORAGE) != PackageManager.PERMISSION_GRANTED)
                        permissions.add(Manifest.permission.READ_EXTERNAL_STORAGE)
                }
                if (permissions.isNotEmpty()) requestPermissionLauncher.launch(permissions.toTypedArray())
                else loadMedia()
            }
        
            private fun loadMedia() {
                mediaItems.clear(); groupedItems.clear()
                loadImages(); loadVideos()
                mediaItems.sortByDescending { it.dateTaken }
                groupByDate()
                adapter.notifyDataSetChanged()
            }
        
            private fun loadImages() {
                val projection = arrayOf(MediaStore.Images.Media._ID, MediaStore.Images.Media.DATA, MediaStore.Images.Media.DATE_TAKEN, MediaStore.Images.Media.DISPLAY_NAME)
                contentResolver.query(MediaStore.Images.Media.EXTERNAL_CONTENT_URI, projection, null, null, null)?.use { cursor ->
                    val idCol = cursor.getColumnIndexOrThrow(MediaStore.Images.Media._ID)
                    val pathCol = cursor.getColumnIndexOrThrow(MediaStore.Images.Media.DATA)
                    val dateCol = cursor.getColumnIndexOrThrow(MediaStore.Images.Media.DATE_TAKEN)
                    val nameCol = cursor.getColumnIndexOrThrow(MediaStore.Images.Media.DISPLAY_NAME)
                    while (cursor.moveToNext()) {
                        val path = cursor.getString(pathCol)
                        if (File(path).exists()) mediaItems.add(MediaItem(cursor.getLong(idCol), path, cursor.getLong(dateCol), MediaType.IMAGE, cursor.getString(nameCol)))
                    }
                }
            }
        
            private fun loadVideos() {
                val projection = arrayOf(MediaStore.Video.Media._ID, MediaStore.Video.Media.DATA, MediaStore.Video.Media.DATE_TAKEN, MediaStore.Video.Media.DISPLAY_NAME)
                contentResolver.query(MediaStore.Video.Media.EXTERNAL_CONTENT_URI, projection, null, null, null)?.use { cursor ->
                    val idCol = cursor.getColumnIndexOrThrow(MediaStore.Video.Media._ID)
                    val pathCol = cursor.getColumnIndexOrThrow(MediaStore.Video.Media.DATA)
                    val dateCol = cursor.getColumnIndexOrThrow(MediaStore.Video.Media.DATE_TAKEN)
                    val nameCol = cursor.getColumnIndexOrThrow(MediaStore.Video.Media.DISPLAY_NAME)
                    while (cursor.moveToNext()) {
                        val path = cursor.getString(pathCol)
                        if (File(path).exists()) mediaItems.add(MediaItem(cursor.getLong(idCol), path, cursor.getLong(dateCol), MediaType.VIDEO, cursor.getString(nameCol)))
                    }
                }
            }
        
            private fun groupByDate() {
                val dateFormat = SimpleDateFormat("d MMMM yyyy", Locale.getDefault())
                val today = Calendar.getInstance()
                val yesterday = Calendar.getInstance().apply { add(Calendar.DAY_OF_YEAR, -1) }
                val grouped = mutableMapOf<String, MutableList<MediaItem>>()
                mediaItems.forEach { item ->
                    val calendar = Calendar.getInstance().apply { time = Date(item.dateTaken) }
                    val label = when {
                        calendar.get(Calendar.YEAR) == today.get(Calendar.YEAR) && calendar.get(Calendar.DAY_OF_YEAR) == today.get(Calendar.DAY_OF_YEAR) -> "Сегодня"
                        calendar.get(Calendar.YEAR) == yesterday.get(Calendar.YEAR) && calendar.get(Calendar.DAY_OF_YEAR) == yesterday.get(Calendar.DAY_OF_YEAR) -> "Вчера"
                        else -> dateFormat.format(Date(item.dateTaken))
                    }
                    grouped.getOrPut(label) { mutableListOf() }.add(item)
                }
                groupedItems.addAll(grouped.entries.sortedByDescending {
                    when (it.key) {
                        "Сегодня" -> Long.MAX_VALUE
                        "Вчера" -> Long.MAX_VALUE - 1
                        else -> try { SimpleDateFormat("d MMMM yyyy", Locale.getDefault()).parse(it.key)?.time ?: 0L } catch (e: Exception) { 0L }
                    }
                }.map { Pair(it.key, it.value) })
            }
        
            override fun onResume() { super.onResume(); if (::adapter.isInitialized) loadMedia() }
        }
        EOF
        fi
        
        # MediaItem.kt
        if [ ! -f "app/src/main/java/com/example/mygallery/MediaItem.kt" ]; then
          echo "⚠️  MediaItem.kt not found! Creating..."
          mkdir -p app/src/main/java/com/example/mygallery
          cat > app/src/main/java/com/example/mygallery/MediaItem.kt << 'EOF'
        package com.example.mygallery
        enum class MediaType { IMAGE, VIDEO }
        data class MediaItem(val id: Long, val path: String, val dateTaken: Long, val type: MediaType, val displayName: String = "")
        EOF
        fi
        
        # MediaAdapter.kt
        if [ ! -f "app/src/main/java/com/example/mygallery/MediaAdapter.kt" ]; then
          echo "⚠️  MediaAdapter.kt not found! Creating..."
          mkdir -p app/src/main/java/com/example/mygallery
          cat > app/src/main/java/com/example/mygallery/MediaAdapter.kt << 'EOF'
        package com.example.mygallery
        import android.view.LayoutInflater
        import android.view.View
        import android.view.ViewGroup
        import android.widget.ImageView
        import android.widget.TextView
        import androidx.recyclerview.widget.RecyclerView
        import com.bumptech.glide.Glide
        import java.io.File
        class MediaAdapter(private val groupedItems: List<Pair<String, List<MediaItem>>>, private val onItemClick: (MediaItem) -> Unit) : RecyclerView.Adapter<RecyclerView.ViewHolder>() {
            companion object { private const val TYPE_HEADER = 0; private const val TYPE_ITEM = 1 }
            override fun getItemViewType(position: Int): Int {
                var pos = position
                for (group in groupedItems) {
                    if (pos == 0) return TYPE_HEADER
                    pos--
                    if (pos < group.second.size) return TYPE_ITEM
                    pos -= group.second.size
                }
                return TYPE_ITEM
            }
            override fun onCreateViewHolder(parent: ViewGroup, viewType: Int): RecyclerView.ViewHolder {
                return when (viewType) {
                    TYPE_HEADER -> HeaderViewHolder(LayoutInflater.from(parent.context).inflate(R.layout.item_header, parent, false))
                    else -> MediaViewHolder(LayoutInflater.from(parent.context).inflate(R.layout.item_media, parent, false))
                }
            }
            override fun onBindViewHolder(holder: RecyclerView.ViewHolder, position: Int) {
                var pos = position
                for (group in groupedItems) {
                    if (pos == 0) { if (holder is HeaderViewHolder) holder.bind(group.first); return }
                    pos--
                    if (pos < group.second.size) { if (holder is MediaViewHolder) holder.bind(group.second[pos], onItemClick); return }
                    pos -= group.second.size
                }
            }
            override fun getItemCount(): Int { var count = 0; groupedItems.forEach { count += 1 + it.second.size }; return count }
            class HeaderViewHolder(itemView: View) : RecyclerView.ViewHolder(itemView) {
                private val headerText: TextView = itemView.findViewById(R.id.headerText)
                fun bind(date: String) { headerText.text = date }
            }
            class MediaViewHolder(itemView: View) : RecyclerView.ViewHolder(itemView) {
                private val imageView: ImageView = itemView.findViewById(R.id.imageView)
                private val videoIcon: ImageView = itemView.findViewById(R.id.videoIcon)
                fun bind(item: MediaItem, onItemClick: (MediaItem) -> Unit) {
                    Glide.with(itemView.context).load(File(item.path)).centerCrop().thumbnail(0.5f).into(imageView)
                    videoIcon.visibility = if (item.type == MediaType.VIDEO) View.VISIBLE else View.GONE
                    itemView.setOnClickListener { onItemClick(item) }
                }
            }
        }
        EOF
        fi
        
        # FullscreenActivity.kt
        if [ ! -f "app/src/main/java/com/example/mygallery/FullscreenActivity.kt" ]; then
          echo "⚠️  FullscreenActivity.kt not found! Creating..."
          mkdir -p app/src/main/java/com/example/mygallery
          cat > app/src/main/java/com/example/mygallery/FullscreenActivity.kt << 'EOF'
        package com.example.mygallery
        
        import android.content.Intent
        import android.net.Uri
        import android.os.Bundle
        import android.provider.MediaStore
        import android.widget.Button
        import android.widget.Toast
        import androidx.appcompat.app.AlertDialog
        import androidx.appcompat.app.AppCompatActivity
        import com.bumptech.glide.Glide
        import com.github.chrisbanes.photoview.PhotoView
        import java.io.File
        
        class FullscreenActivity : AppCompatActivity() {
            private lateinit var photoView: PhotoView
            private lateinit var btnDelete: Button
            private lateinit var btnEdit: Button
            private lateinit var mediaItem: MediaItem
        
            companion object {
                fun start(activity: MainActivity, mediaItem: MediaItem) {
                    val intent = Intent(activity, FullscreenActivity::class.java)
                    intent.putExtra("media_item", mediaItem)
                    activity.startActivity(intent)
                }
            }
        
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_fullscreen)
                mediaItem = intent.getSerializableExtra("media_item") as MediaItem
                photoView = findViewById(R.id.photoView)
                btnDelete = findViewById(R.id.btnDelete)
                btnEdit = findViewById(R.id.btnEdit)
                setupViews()
                setupButtons()
            }
        
            private fun setupViews() {
                if (mediaItem.type == MediaType.VIDEO) {
                    val uri = Uri.fromFile(File(mediaItem.path))
                    val intent = Intent(Intent.ACTION_VIEW).apply {
                        setDataAndType(uri, "video/*")
                        addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION)
                    }
                    startActivity(intent); finish(); return
                }
                Glide.with(this).load(File(mediaItem.path)).into(photoView)
            }
        
            private fun setupButtons() {
                btnDelete.setOnClickListener { showDeleteDialog() }
                btnEdit.setOnClickListener { EditorActivity.start(this, mediaItem.path) }
            }
        
            private fun showDeleteDialog() {
                AlertDialog.Builder(this).setTitle("Удалить файл").setMessage("Вы уверены?").setPositiveButton("Удалить") { _, _ -> deleteFile() }.setNegativeButton("Отмена", null).show()
            }
        
            private fun deleteFile() {
                try {
                    val uri = if (mediaItem.type == MediaType.IMAGE) MediaStore.Images.Media.EXTERNAL_CONTENT_URI else MediaStore.Video.Media.EXTERNAL_CONTENT_URI
                    val selection = "${MediaStore.MediaColumns._ID}=?"
                    val selectionArgs = arrayOf(mediaItem.id.toString())
                    val deleted = contentResolver.delete(uri, selection, selectionArgs) > 0
                    if (deleted) { Toast.makeText(this, "Удалено", Toast.LENGTH_SHORT).show(); finish() }
                    else { val file = File(mediaItem.path); if (file.exists() && file.delete()) { Toast.makeText(this, "Удалено", Toast.LENGTH_SHORT).show(); finish() } else Toast.makeText(this, "Ошибка", Toast.LENGTH_SHORT).show() }
                } catch (e: Exception) { Toast.makeText(this, "Ошибка: ${e.message}", Toast.LENGTH_SHORT).show() }
            }
        }
        EOF
        fi
        
        # EditorActivity.kt
        if [ ! -f "app/src/main/java/com/example/mygallery/EditorActivity.kt" ]; then
          echo "⚠️  EditorActivity.kt not found! Creating..."
          mkdir -p app/src/main/java/com/example/mygallery
          cat > app/src/main/java/com/example/mygallery/EditorActivity.kt << 'EOF'
        package com.example.mygallery
        
        import android.content.ContentValues
        import android.content.Intent
        import android.graphics.Bitmap
        import android.graphics.Color
        import android.net.Uri
        import android.os.Build
        import android.os.Bundle
        import android.os.Environment
        import android.provider.MediaStore
        import android.view.View
        import android.widget.Button
        import android.widget.EditText
        import android.widget.ImageButton
        import android.widget.Toast
        import androidx.appcompat.app.AlertDialog
        import androidx.appcompat.app.AppCompatActivity
        import com.burhanrashid52.photoeditor.PhotoEditor
        import com.burhanrashid52.photoeditor.PhotoEditorView
        import java.io.File
        import java.io.FileOutputStream
        
        class EditorActivity : AppCompatActivity() {
            private lateinit var photoEditorView: PhotoEditorView
            private lateinit var photoEditor: PhotoEditor
            private lateinit var btnSave: Button
            private lateinit var btnCancel: Button
            private lateinit var btnText: Button
            private lateinit var btnBrush: Button
            private lateinit var btnUndo: ImageButton
            private lateinit var etText: EditText
            private lateinit var btnAddText: Button
            private lateinit var colorPicker: View
            private var imagePath: String = ""
            private var currentColor: Int = Color.RED
            private var isBrushMode = false
        
            companion object {
                fun start(activity: FullscreenActivity, path: String) {
                    val intent = Intent(activity, EditorActivity::class.java)
                    intent.putExtra("image_path", path)
                    activity.startActivity(intent)
                }
            }
        
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_editor)
                imagePath = intent.getStringExtra("image_path") ?: ""
                initViews()
                setupPhotoEditor()
                setupButtons()
            }
        
            private fun initViews() {
                photoEditorView = findViewById(R.id.photoEditorView)
                btnSave = findViewById(R.id.btnSave)
                btnCancel = findViewById(R.id.btnCancel)
                btnText = findViewById(R.id.btnText)
                btnBrush = findViewById(R.id.btnBrush)
                btnUndo = findViewById(R.id.btnUndo)
                etText = findViewById(R.id.etText)
                btnAddText = findViewById(R.id.btnAddText)
                colorPicker = findViewById(R.id.colorPicker)
            }
        
            private fun setupPhotoEditor() {
                photoEditor = PhotoEditor.Builder(this, photoEditorView).setPinchTextScalable(true).build()
                photoEditorView.source.setImageBitmap(android.graphics.BitmapFactory.decodeFile(imagePath))
            }
        
            private fun setupButtons() {
                colorPicker.setOnClickListener { showColorPickerDialog() }
                btnText.setOnClickListener {
                    etText.visibility = View.VISIBLE
                    btnAddText.visibility = View.VISIBLE
                    photoEditor.setBrushDrawingMode(false)
                    isBrushMode = false
                }
                btnAddText.setOnClickListener {
                    val text = etText.text.toString()
                    if (text.isNotEmpty()) {
                        photoEditor.addText(text, currentColor)
                        etText.text.clear()
                        etText.visibility = View.GONE
                        btnAddText.visibility = View.GONE
                    } else Toast.makeText(this, "Введите текст", Toast.LENGTH_SHORT).show()
                }
                btnBrush.setOnClickListener {
                    isBrushMode = !isBrushMode
                    photoEditor.setBrushDrawingMode(isBrushMode)
                    photoEditor.setBrushColor(currentColor)
                    btnBrush.isSelected = isBrushMode
                    etText.visibility = View.GONE
                    btnAddText.visibility = View.GONE
                }
                btnUndo.setOnClickListener { photoEditor.undo() }
                btnCancel.setOnClickListener { finish() }
                btnSave.setOnClickListener { saveEditedImage() }
            }
        
            private fun showColorPickerDialog() {
                val colors = arrayOf(Color.RED, Color.BLUE, Color.GREEN, Color.YELLOW, Color.CYAN, Color.MAGENTA, Color.BLACK, Color.WHITE)
                val colorNames = arrayOf("Красный", "Синий", "Зеленый", "Желтый", "Голубой", "Фиолетовый", "Черный", "Белый")
                AlertDialog.Builder(this).setTitle("Выберите цвет").setItems(colorNames) { _, which ->
                    currentColor = colors[which]
                    colorPicker.setBackgroundColor(currentColor)
                    if (isBrushMode) photoEditor.setBrushColor(currentColor)
                }.show()
            }
        
            private fun saveEditedImage() {
                try {
                    val bitmap = photoEditorView.source.getBitmap() ?: return
                    val values = ContentValues().apply {
                        put(MediaStore.Images.Media.DISPLAY_NAME, "edited_${System.currentTimeMillis()}.jpg")
                        put(MediaStore.Images.Media.MIME_TYPE, "image/jpeg")
                        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                            put(MediaStore.Images.Media.RELATIVE_PATH, "${Environment.DIRECTORY_PICTURES}/MyGallery")
                        } else {
                            put(MediaStore.Images.Media.DATA, "${Environment.getExternalStorageDirectory().absolutePath}/Pictures/MyGallery/")
                        }
                    }
                    val uri = contentResolver.insert(MediaStore.Images.Media.EXTERNAL_CONTENT_URI, values)
                    uri?.let {
                        contentResolver.openOutputStream(it)?.use { outputStream -> bitmap.compress(Bitmap.CompressFormat.JPEG, 90, outputStream) }
                        Toast.makeText(this, "Сохранено", Toast.LENGTH_SHORT).show(); finish()
                    } ?: run {
                        val file = File(getExternalFilesDir(null), "edited_${System.currentTimeMillis()}.jpg")
                        FileOutputStream(file).use { outputStream -> bitmap.compress(Bitmap.CompressFormat.JPEG, 90, outputStream) }
                        Toast.makeText(this, "Сохранено", Toast.LENGTH_SHORT).show(); finish()
                    }
                } catch (e: Exception) { Toast.makeText(this, "Ошибка: ${e.message}", Toast.LENGTH_SHORT).show() }
            }
        }
        EOF
        fi
        
        # Проверяем XML файлы
        echo "📁 Checking XML layout files..."
        
        # activity_main.xml
        if [ ! -f "app/src/main/res/layout/activity_main.xml" ]; then
          mkdir -p app/src/main/res/layout
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <androidx.constraintlayout.widget.ConstraintLayout xmlns:android="http://schemas.android.com/apk/res/android"
            xmlns:app="http://schemas.android.com/apk/res-auto"
            android:layout_width="match_parent"
            android:layout_height="match_parent">
            <androidx.recyclerview.widget.RecyclerView
                android:id="@+id/recyclerView"
                android:layout_width="match_parent"
                android:layout_height="match_parent"
                android:padding="8dp"
                app:layout_constraintBottom_toBottomOf="parent"
                app:layout_constraintTop_toTopOf="parent" />
        </androidx.constraintlayout.widget.ConstraintLayout>
        EOF
        fi
        
        # item_header.xml
        if [ ! -f "app/src/main/res/layout/item_header.xml" ]; then
          mkdir -p app/src/main/res/layout
          cat > app/src/main/res/layout/item_header.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <TextView xmlns:android="http://schemas.android.com/apk/res/android"
            android:id="@+id/headerText"
            android:layout_width="match_parent"
            android:layout_height="wrap_content"
            android:padding="16dp"
            android:textSize="18sp"
            android:textStyle="bold"
            android:textColor="#2196F3" />
        EOF
        fi
        
        # item_media.xml
        if [ ! -f "app/src/main/res/layout/item_media.xml" ]; then
          mkdir -p app/src/main/res/layout
          cat > app/src/main/res/layout/item_media.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="200dp"
            android:layout_margin="4dp">
            <ImageView
                android:id="@+id/imageView"
                android:layout_width="match_parent"
                android:layout_height="match_parent"
                android:scaleType="centerCrop" />
            <ImageView
                android:id="@+id/videoIcon"
                android:layout_width="48dp"
                android:layout_height="48dp"
                android:layout_gravity="center"
                android:src="@android:drawable/ic_media_play"
                android:visibility="gone" />
        </FrameLayout>
        EOF
        fi
        
        # activity_fullscreen.xml
        if [ ! -f "app/src/main/res/layout/activity_fullscreen.xml" ]; then
          mkdir -p app/src/main/res/layout
          cat > app/src/main/res/layout/activity_fullscreen.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:background="#000000">
            <com.github.chrisbanes.photoview.PhotoView
                android:id="@+id/photoView"
                android:layout_width="match_parent"
                android:layout_height="0dp"
                android:layout_weight="1"
                android:scaleType="fitCenter" />
            <LinearLayout
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:orientation="horizontal"
                android:padding="16dp"
                android:gravity="center">
                <Button
                    android:id="@+id/btnEdit"
                    android:layout_width="0dp"
                    android:layout_height="wrap_content"
                    android:layout_weight="1"
                    android:text="Редактировать"
                    android:layout_marginEnd="8dp" />
                <Button
                    android:id="@+id/btnDelete"
                    android:layout_width="0dp"
                    android:layout_height="wrap_content"
                    android:layout_weight="1"
                    android:text="Удалить"
                    android:backgroundTint="#D32F2F" />
            </LinearLayout>
        </LinearLayout>
        EOF
        fi
        
        # activity_editor.xml
        if [ ! -f "app/src/main/res/layout/activity_editor.xml" ]; then
          mkdir -p app/src/main/res/layout
          cat > app/src/main/res/layout/activity_editor.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:background="#FFFFFF">
            <com.burhanrashid52.photoeditor.PhotoEditorView
                android:id="@+id/photoEditorView"
                android:layout_width="match_parent"
                android:layout_height="0dp"
                android:layout_weight="1" />
            <LinearLayout
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:orientation="vertical"
                android:padding="8dp"
                android:background="#F5F5F5">
                <LinearLayout
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:orientation="horizontal"
                    android:gravity="center">
                    <ImageButton
                        android:id="@+id/btnText"
                        android:layout_width="48dp"
                        android:layout_height="48dp"
                        android:src="@android:drawable/ic_menu_edit"
                        android:background="?attr/selectableItemBackgroundBorderless"
                        android:contentDescription="Текст" />
                    <ImageButton
                        android:id="@+id/btnBrush"
                        android:layout_width="48dp"
                        android:layout_height="48dp"
                        android:src="@android:drawable/ic_menu_edit"
                        android:background="?attr/selectableItemBackgroundBorderless"
                        android:contentDescription="Кисть" />
                    <View
                        android:id="@+id/colorPicker"
                        android:layout_width="40dp"
                        android:layout_height="40dp"
                        android:background="#FF0000"
                        android:layout_marginHorizontal="8dp" />
                    <ImageButton
                        android:id="@+id/btnUndo"
                        android:layout_width="48dp"
                        android:layout_height="48dp"
                        android:src="@android:drawable/ic_menu_revert"
                        android:background="?attr/selectableItemBackgroundBorderless"
                        android:contentDescription="Отменить" />
                </LinearLayout>
                <LinearLayout
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:orientation="horizontal"
                    android:visibility="gone"
                    android:id="@+id/textInputLayout">
                    <EditText
                        android:id="@+id/etText"
                        android:layout_width="0dp"
                        android:layout_height="wrap_content"
                        android:layout_weight="1"
                        android:hint="Введите текст"
                        android:padding="8dp"
                        android:background="@android:drawable/editbox_background" />
                    <Button
                        android:id="@+id/btnAddText"
                        android:layout_width="wrap_content"
                        android:layout_height="wrap_content"
                        android:text="Добавить" />
                </LinearLayout>
                <LinearLayout
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:orientation="horizontal"
                    android:gravity="center"
                    android:layout_marginTop="8dp">
                    <Button
                        android:id="@+id/btnCancel"
                        android:layout_width="0dp"
                        android:layout_height="wrap_content"
                        android:layout_weight="1"
                        android:text="Отмена"
                        android:backgroundTint="#9E9E9E"
                        android:layout_marginEnd="4dp" />
                    <Button
                        android:id="@+id/btnSave"
                        android:layout_width="0dp"
                        android:layout_height="wrap_content"
                        android:layout_weight="1"
                        android:text="Сохранить"
                        android:backgroundTint="#4CAF50"
                        android:layout_marginStart="4dp" />
                </LinearLayout>
            </LinearLayout>
        </LinearLayout>
        EOF
        fi
        
        # strings.xml
        if [ ! -f "app/src/main/res/values/strings.xml" ]; then
          mkdir -p app/src/main/res/values
          cat > app/src/main/res/values/strings.xml << 'EOF'
        <resources>
            <string name="app_name">Моя Галерея</string>
        </resources>
        EOF
        fi
        
        # themes.xml
        if [ ! -f "app/src/main/res/values/themes.xml" ]; then
          mkdir -p app/src/main/res/values
          cat > app/src/main/res/values/themes.xml << 'EOF'
        <resources>
            <style name="Theme.AppCompat.Light.DarkActionBar" parent="Theme.AppCompat.Light.DarkActionBar" />
        </resources>
        EOF
        fi
        
        echo "✅ All files verified and created if needed!"
        echo "🔨 Starting Gradle build..."

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || true

    - name: Build APK
      run: |
        # Попытка 1: Стандартная сборка
        if ./gradlew assembleDebug; then
          echo "✅ Build successful!"
        else
          echo "⚠️ Build failed, trying fix..."
          # Попытка 2: Сборка с очисткой
          ./gradlew clean assembleDebug || {
            echo "⚠️ Still failing, trying with gradle wrapper init..."
            # Попытка 3: Создаём wrapper заново
            gradle wrapper
            ./gradlew clean assembleDebug
          }
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MyGallery
        path: app/build/outputs/apk/debug/*.apk
